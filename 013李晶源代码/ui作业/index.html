<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李晶 - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #333333;
            color: #ffffff;
            padding: 60px 20px;
        }
        .wrap {
            width: 700px;
            margin: 0 auto;
        }

        .info-card {
            background-color: #444444;
            border-radius: 16px;
            padding: 35px;
            display: flex;
            align-items: flex-start;
            gap: 30px;
        }
        /* 方形头像，读取本地图片 */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-area h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .text-area p {
            color: #dddddd;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .link-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-box a {
            width: 160px;
            padding: 9px 0;
            text-align: center;
            background-color: #555555;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
        }

        .space {
            height: 60px;
        }

        .skill-card {
            background-color: #444444;
            border-radius: 16px;
            padding: 50px 35px;
        }
        .skill-card h2 {
            text-align: center;
            margin-bottom: 35px;
        }
        .skill-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .skill-item {
            width: 100%;
            padding: 32px;
            background-color: #505050;
            text-align: center;
            border-radius: 12px;
            font-size: 18px;
        }

        footer {
            margin-top: 70px;
            text-align: center;
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="info-card">
            <div class="avatar">
                <!-- 本地图片，和html同目录 -->
                <img src="avatar.jpg">
            </div>
            <div class="text-area">
                <h1>李晶</h1>
                <p>计算机应用技术专业<br>前端网页设计 | UI界面设计</p>
                <div class="link-box">
                    <a href="#">项目作品</a>
                    <a href="#">个人简历</a>
                    <a href="#">联系方式</a>
                </div>
            </div>
        </div>

        <div class="space"></div>

        <div class="skill-card">
            <h2>我的专业技能</h2>
            <div class="skill-list">
                <div class="skill-item">HTML+CSS静态网页开发</div>
                <div class="skill-item">计算机基础技术应用</div>
                <div class="skill-item">网页UI界面设计制作</div>
            </div>
        </div>

        <footer>
            学号后三位：013 &nbsp;&nbsp; 姓名：李晶 &nbsp;&nbsp; 期末网页大作业
        </footer>
    </div>
</body>
</html>
